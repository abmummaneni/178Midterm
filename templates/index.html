<!DOCTYPE html>
<html>
<header>
    <title>Student Outcomes</title>
    <link href="static/css/nouislider.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="static/css/style.css" media="screen" />
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="static/js/nouislider.min.js"></script>
    <script src="static/js/script.js"></script>
</header>

<body>
  <div class="container" style="border: 0px solid gray; padding: 15px; width: 1250px; margin: 0 auto;">

    <!-- top controls -->
    <div style="margin-bottom: 20px;">
      <label>x:</label>
      <select id="x-select" onchange="update_all()">
        {% for col in continuous_columns %}
          <option value="{{ col }}" {% if col == default_x %}selected{% endif %}>{{ col }}</option>
        {% endfor %}
      </select>

      <label style="margin-left: 20px;">y:</label>
      <select id="y-select" onchange="update_all()">
        {% for col in continuous_columns %}
          <option value="{{ col }}" {% if col == default_y %}selected{% endif %}>{{ col }}</option>
        {% endfor %}
      </select>

      <label style="margin-left: 20px;">Facet:</label>
      <select id="facet-select" onchange="update_all()">
        {% for col in discrete_columns %}
          <option value="{{ col }}" {% if col == "PlacementStatus" %}selected{% endif %}>{{ col }}</option>
        {% endfor %}
      </select>

      <label style="margin-left: 20px;">Display:</label>
      <select id="display-mode" onchange="update_all()">
        <option value="scatter">Scatter</option>
        <option value="jitter" selected>Jitter</option>
        <option value="heatmap">Heatmap</option>
      </select>
    </div>

    <!-- main content -->
    <div style="display: flex; align-items: flex-start;">

      <!-- left side: two scatterplots -->
      <div style="display: flex; gap: 30px;">

        <div>
          <div id="facet-left-title" style="text-align: center; font-size: 20px; margin-bottom: 8px;">
            PlacementStatus: Placed
          </div>
          <div id="scatter-left"></div>
          <div id="facet-left-info" style="margin-top: 12px; padding: 12px; width: 500px; border: 1px solid #d0d0d0; background: #ffffff; font-size: 13px; line-height: 1.5; box-sizing: border-box; white-space: pre-line;"></div>
        </div>

        <div>
          <div id="facet-right-title" style="text-align: center; font-size: 20px; margin-bottom: 8px;">
            PlacementStatus: NotPlaced
          </div>
          <div id="scatter-right"></div>
          <div id="facet-right-info" style="margin-top: 12px; padding: 12px; width: 500px; border: 1px solid #d0d0d0; background: #ffffff; font-size: 13px; line-height: 1.5; box-sizing: border-box; white-space: pre-line;"></div>
        </div>

      </div>

      <!-- right side: filters -->
      <div style="margin-left: 35px; width: 250px;">

        <div style="margin-bottom: 25px;">
          <h3>Internships</h3>
          <div id="Internships-slider" style="width:220px;"></div>
        </div>

        <div style="margin-bottom: 25px;">
          <h3>Projects</h3>
          <div id="Projects-slider" style="width:220px;"></div>
        </div>

        <div style="margin-bottom: 25px;">
          <h3>AptitudeTestScore</h3>
          <div id="AptitudeTestScore-slider" style="width:220px;"></div>
        </div>

        <div style="margin-bottom: 25px;">
          <h3>SoftSkillsRating</h3>
          <div id="SoftSkillsRating-slider" style="width:220px;"></div>
        </div>

        <div style="margin-bottom: 25px;">
          <h3>SSC_Marks</h3>
          <div id="SSC_Marks-slider" style="width:220px;"></div>
        </div>

        <div style="margin-bottom: 25px;">
          <h3>HSC_Marks</h3>
          <div id="HSC_Marks-slider" style="width:220px;"></div>
        </div>

        <div style="margin-bottom: 25px;">
          <h3>ExtracurricularActivities</h3>
          <label style="margin-right: 20px;">
            <input type="checkbox" data-column="ExtracurricularActivities" value="Yes" onchange="update_all()" checked>
            Yes
          </label>
          <label>
            <input type="checkbox" data-column="ExtracurricularActivities" value="No" onchange="update_all()" checked>
            No
          </label>
        </div>

        <div style="margin-bottom: 25px;">
          <h3>PlacementTraining</h3>
          <label style="margin-right: 20px;">
            <input type="checkbox" data-column="PlacementTraining" value="Yes" onchange="update_all()" checked>
            Yes
          </label>
          <label>
            <input type="checkbox" data-column="PlacementTraining" value="No" onchange="update_all()" checked>
            No
          </label>
        </div>

      </div>
    </div>
  </div>
</body>

<script>
  const margin = {top: 20, right: 20, bottom: 60, left: 60};
  const width = 420;
  const height = 560;

  window.plot_width = width;
  window.plot_height = height;

  window.left_scatter_svg = draw_svg('scatter-left', margin, width, height);
  window.right_scatter_svg = draw_svg('scatter-right', margin, width, height);

  window.left_scatter_scale = draw_axes(
    'scatter-left',
    window.left_scatter_svg,
    width,
    height,
    {{ scatter_ranges[:2] | tojson }},
    {{ scatter_ranges[2:] | tojson }}
  );

  window.right_scatter_scale = draw_axes(
    'scatter-right',
    window.right_scatter_svg,
    width,
    height,
    {{ scatter_ranges[:2] | tojson }},
    {{ scatter_ranges[2:] | tojson }}
  );

  draw_axis_labels(
    'scatter-left',
    window.left_scatter_svg,
    width,
    height,
    '{{ default_x }}',
    '{{ default_y }}'
  );

  draw_axis_labels(
    'scatter-right',
    window.right_scatter_svg,
    width,
    height,
    '{{ default_x }}',
    '{{ default_y }}'
  );

  {% for column, minmax in filter_ranges.items() %}
    draw_slider('{{ column }}', {{ minmax[0] }}, {{ minmax[1] }});
  {% endfor %}

  update_all();
</script>
</html>
